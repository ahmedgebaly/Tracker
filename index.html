<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Hope Community Tracker</title>
    <meta
      name="description"
      content="متابع الشهر — تابع عاداتك يوميًا وشهريًا مع Hope Community Tracker. تتبع الإنجاز، العرض اليومي والشهري، وحفظ محلي لبياناتك."
    />
    <meta name="theme-color" content="#1b5e20" />

    <!-- Open Graph (Facebook, WhatsApp, Telegram) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hope Community Tracker" />
    <meta property="og:locale" content="ar_AR" />
    <meta property="og:title" content="متابع الشهر | Hope Community Tracker" />
    <meta
      property="og:description"
      content="تابع عاداتك يوميًا وشهريًا — عرض اليوم والشهر، ملخص الإنجاز، وحفظ محلي لبياناتك."
    />
    <meta property="og:url" content="https://ahmedgebaly.github.io/Tracker/" />
    <meta
      property="og:image"
      content="https://ahmedgebaly.github.io/Tracker/og-image.jpg"
    />
    <meta
      property="og:image:secure_url"
      content="https://ahmedgebaly.github.io/Tracker/og-image.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="متابع الشهر — New Hope Community Tracker"
    />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="متابع الشهر | Hope Community Tracker" />
    <meta
      name="twitter:description"
      content="تابع عاداتك يوميًا وشهريًا — عرض اليوم والشهر، ملخص الإنجاز، وحفظ محلي لبياناتك."
    />
    <meta
      name="twitter:image"
      content="https://ahmedgebaly.github.io/Tracker/og-image.jpg"
    />
    <meta
      name="twitter:image:alt"
      content="متابع الشهر — Hope Community Tracker"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg
      width="0"
      height="0"
      style="position: absolute"
      aria-hidden="true"
      focusable="false"
    >
      <filter id="liquid-refract" x="0" y="0" width="100%" height="100%">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.008 0.008"
          numOctaves="2"
          seed="4"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="blurred"
          scale="40"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>

    <div class="header">
      <h1 class="app-title liquid-glass">
        <span class="app-title-badge" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M7 3v2M17 3v2"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
            />
            <rect x="4" y="5" width="16" height="15" rx="3" fill="#fff" />
            <path d="M4 10h16" stroke="#c4b5e0" stroke-width="1.5" />
            <rect
              x="7.5"
              y="13"
              width="2.5"
              height="2.5"
              rx="0.5"
              fill="#c4b5e0"
            />
            <rect
              x="11"
              y="13"
              width="2.5"
              height="2.5"
              rx="0.5"
              fill="#c4b5e0"
            />
            <rect
              x="14.5"
              y="13"
              width="2.5"
              height="2.5"
              rx="0.5"
              fill="#c4b5e0"
            />
          </svg>
        </span>
        <span id="appTitle">متابع الشهر</span>
      </h1>
    </div>

    <div class="top-bar">
      <div
        class="view-toggle liquid-glass"
        id="viewToggle"
        data-mode="day"
        role="group"
        aria-label="طريقة العرض"
      >
        <span class="view-toggle-pill" aria-hidden="true"></span>
        <button
          class="view-toggle-btn"
          id="showDayBtn"
          type="button"
          aria-pressed="true"
        >
          عرض اليوم
        </button>
        <button
          class="view-toggle-btn"
          id="showMonthBtn"
          type="button"
          aria-pressed="false"
        >
          عرض الشهر
        </button>
      </div>
      <div class="month-nav-bar liquid-glass" aria-label="التنقل بين الشهور">
        <button type="button" id="prevMonthBtn" class="nav-step-btn">
          <span class="nav-step-icon" aria-hidden="true">▶</span> الشهر السابق
        </button>
        <span id="monthNavTitle" class="month-nav-label"></span>
        <button type="button" id="nextMonthBtn" class="nav-step-btn">
          الشهر التالي <span class="nav-step-icon" aria-hidden="true">◀</span>
        </button>
      </div>
      <button
        type="button"
        id="settingsBtn"
        class="theme-toggle liquid-glass-lite"
        style="display: none"
        aria-label="الإعدادات"
      >
        ⚙ الإعدادات
      </button>
    </div>

    <div class="day-view" id="dayView">
      <div class="day-view-header liquid-glass">
        <button type="button" id="prevDayBtn" class="nav-step-btn">
          <span class="nav-step-icon" aria-hidden="true">▶</span> اليوم السابق
        </button>
        <h2 id="dayViewTitle" class="day-date-chip liquid-glass-lite"></h2>
        <button type="button" id="nextDayBtn" class="nav-step-btn">
          اليوم التالي <span class="nav-step-icon" aria-hidden="true">◀</span>
        </button>
      </div>
      <div class="day-picker-row liquid-glass">
        <label for="daySelect">اختر يومًا آخر:</label>
        <div class="select-wrap">
          <select id="daySelect"></select>
        </div>
        <button type="button" id="goTodayBtn" class="btn-today">اليوم</button>
      </div>
      <div class="day-habit-list" id="dayHabitList"></div>
      <div class="day-total liquid-glass" id="dayTotal"></div>
    </div>

    <div class="month-panel" id="monthPanel">
      <div class="month-heatmap-shell">
        <div class="table-legend-bar" id="tableLegendBar">
          <div class="table-legend" aria-hidden="true">
            <span><span class="legend-swatch empty"></span> غير محدد</span>
            <span><span class="legend-swatch done"></span> ✓ تم</span>
            <span><span class="legend-swatch missed">✗</span> غير مكتمل</span>
          </div>
        </div>
        <div class="table-wrap liquid-glass heatmap-glass">
          <table id="trackerTable">
            <thead>
              <tr id="headerRow" class="day-header-row"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="month-summary" id="monthSummary">
        <div class="month-summary-card liquid-glass">
          <h3>ملخص إنجاز الشهر لكل عادة</h3>
          <div id="monthSummaryList"></div>
        </div>
      </div>

      <div class="weekly-section" id="weeklySection"></div>
    </div>

    <div class="footer-note" id="footerNote">
      في عرض اليوم استخدم أزرار ✓ تم و ✗ غير مكتمل. في عرض الشهر اضغط على الخلية
      للتبديل بين الفارغ و ✓ و ✗. تُحفظ بياناتك تلقائيًا محليًا لكل شهر على حدة.
    </div>

    <div class="theme-switch-wrap">
      <label class="theme-switch liquid-glass-lite" for="themeToggle">
        <span class="theme-switch-label" id="themeSwitchLabel">وضع داكن</span>
        <input
          type="checkbox"
          id="themeToggle"
          role="switch"
          aria-checked="false"
        />
        <span class="theme-switch-track" aria-hidden="true"></span>
      </label>
    </div>

    <footer class="site-footer" dir="ltr">
      Developed By:
      <span class="site-footer-credit">
        <strong>
          <a
            href="https://www.linkedin.com/in/ahmedgebaly/"
            target="_blank"
            rel="noopener noreferrer"
            >Ahmed El Gebaly</a
          >
        </strong>
        <a
          class="linkedin-icon"
          href="https://www.linkedin.com/in/ahmedgebaly/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn — Ahmed El Gebaly"
        >
          <svg
            viewBox="0 0 24 24"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.23 0z"
            />
          </svg>
        </a>
      </span>
    </footer>

    <div
      class="modal-overlay"
      id="settingsModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="settingsTitle"
    >
      <div class="modal">
        <button
          type="button"
          class="modal-close"
          id="closeSettingsBtn"
          aria-label="إغلاق"
        >
          ×
        </button>
        <h2 id="settingsTitle">الإعدادات</h2>

        <div class="modal-section">
          <h3>الفترة</h3>
          <div class="modal-row">
            <label
              >الشهر:
              <select id="monthSelect"></select>
            </label>
            <label
              >السنة:
              <input
                type="number"
                id="yearInput"
                value="2026"
                min="2000"
                max="2100"
                style="width: 90px"
              />
            </label>
            <button class="primary" type="button" id="loadBtn">تحميل</button>
            <button class="danger" type="button" id="resetBtn">
              مسح بيانات الشهر
            </button>
          </div>
        </div>

        <div class="modal-section">
          <h3>البيانات</h3>
          <div class="modal-row">
            <button type="button" id="exportBtn">تصدير JSON</button>
            <button type="button" id="importBtn">استيراد JSON</button>
            <input
              type="file"
              id="importFile"
              accept=".json"
              style="display: none"
            />
          </div>
        </div>

        <div class="modal-section">
          <h3>العادات</h3>
          <div class="habit-manager">
            <div class="row">
              <input
                type="text"
                id="newHabitName"
                placeholder="اسم عادة جديدة"
                style="flex: 2; min-width: 120px"
              />
              <input
                type="text"
                id="newHabitCat"
                placeholder="التصنيف (مثال: الصباح)"
                style="flex: 1; min-width: 100px"
              />
              <input
                type="text"
                id="newHabitIcon"
                placeholder="إيموجي"
                style="width: 70px"
              />
              <button class="primary" type="button" id="addHabitBtn">
                إضافة عادة
              </button>
            </div>
            <div class="habit-list-manage" id="habitManageList"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="celebration-overlay" id="celebrationOverlay" aria-hidden="true">
      <div class="celebration-banner" id="celebrationBanner">
        🎉 أحسنت! ١٠٠٪
      </div>
    </div>

    <script src="fixture-habits.js"></script>
    <script src="fixture-marks.js"></script>
    <script src="celebration-messages.js"></script>
    <script src="half-x-encouragement-messages.js"></script>
    <script src="default-habits.js"></script>
    <script src="app.js"></script>
  </body>
</html>
